<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGR472 Lab 4</title>
    <!-- mapbox API -->
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.css' rel='stylesheet' />
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Turf.js -->
    <script src='https://unpkg.com/@turf/turf@7.2.0/turf.min.js'></script>
    <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.1.0/mapbox-gl-geocoder.min.js"></script>
    <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.1.0/mapbox-gl-geocoder.css" type="text/css">
</head>

<body>
    <nav class="navbar">
        <a href="index.html" class="nav-link">Home</a>
        <a href="analysis.html" class="nav-link">Analysis</a>
    </nav>
    
    <div class="analysis-panel">
        <h3>Spatial Tools</h3>
        
        <div class="tool-section">
            <p>Distance between Points</p>
            <!-- Buttons set up for choosing point 1 or point 2-->
            <button id="point1" class="analysis-btn">Set Point 1</button>
            <button id="point2" class="analysis-btn">Set Point 2</button>
            <br>
            <!-- Dynamic distance display updated using Turf.distance() function-->
            <p>Distance: <span id="distance-output">0</span> km</p>
        </div>

        <br>
        <!-- Reset button restores map to default Toronto-centered view and zoom level -->
        <button id="reset-btn" class="analysis-btn">Reset Map View</button>
    </div>
    <!-- Coordinates display on right side of screen -->
    <div id="coordinate-display" class="coordinate-info2">Longitude: -79.39 | Latitude: 43.65</div>

    <!-- MAP CONTAINER -->
    <div id='map' class='map'></div>

    <script src="./scripts/script.js"></script>
    <script src="./scripts/functions.js"></script>

</body>

</html>
